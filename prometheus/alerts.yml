groups:
  - name: system_alerts
    interval: 30s
    rules:
      # Alert 1: CPU cao
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 80% on {{ $labels.instance }}"

      # Alert 2: Memory cao
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90% on {{ $labels.instance }}"
          description: "Memory used: {{ $value | printf \"%.1f\" }}%"

      # Alert 3: Response latency cao (P99 > 1s)
      - alert: HighRequestLatency
        expr: histogram_quantile(0.99, sum by(le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "P99 latency > 1s"
          description: "P99 request latency is {{ $value | printf \"%.2f\" }}s (threshold: 1s)"

      # Alert 4: Error rate > 5%
      - alert: HighErrorRate
        expr: (sum(rate(http_requests_total{status=~"5.."}[5m])) or vector(0)) / (sum(rate(http_requests_total[5m])) > 0) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5%"
          description: "HTTP 5xx error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Alert 5: Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Target {{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for > 1 minute"