events {}
http {
    server {
        listen 80;
        resolver 127.0.0.11 valid=10s ipv6=off;

        location / {
            set $upstream http://fastapi-demo:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}